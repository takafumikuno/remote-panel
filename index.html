<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terracaster コントローラー</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 30px;
            text-align: center;
        }
        .btn {
            width: 100%;
            max-width: 400px;
            padding: 25px 20px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            margin-bottom: 20px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.1s, background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active {
            transform: scale(0.98);
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }
        /* 通常連動ボタン（緑） */
        .btn-trigger {
            background-color: #2ecc71;
            color: white;
        }
        .btn-trigger:active {
            background-color: #27ae60;
        }
        /* 強制戻しボタン（赤） */
        .btn-force {
            background-color: #e74c3c;
            color: white;
        }
        .btn-force:active {
            background-color: #c0392b;
        }
        /* 送信中ステータス表示 */
        #status {
            margin-top: 10px;
            font-size: 1rem;
            color: #7f8c8d;
            height: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>テイクコントロールパネル</h1>

    <button class="btn btn-trigger" onclick="sendSignal('terracaster_trigger', '通常連動を送信しました')">
        TerraCasterテイクボタン<br>（3分後に自動的に戻る）
    </button>

    <button class="btn btn-force" onclick="sendSignal('force_normal_trigger', '⚠️ 強制戻しを送信しました')">
        強制戻しテイクボタン
    </button>

    <div id="status"></div>

    <script>
        // あなたの合言葉（トピック名）
        const TOPIC = "my-terracaster-2026";

        function sendSignal(message, successText) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "送信中...";
            statusDiv.style.color = "#7f8c8d";

            // ブラウザのセキュリティに引っかからない方法（POST）でntfyに信号を送信
            fetch(`https://ntfy.sh/${TOPIC}`, {
                method: 'POST',
                body: message
            })
            .then(response => {
                if (response.ok) {
                    statusDiv.innerText = successText;
                    statusDiv.style.color = message === 'force_normal_trigger' ? '#e74c3c' : '#2ecc71';
                } else {
                    statusDiv.innerText = "エラー：送信失敗しました";
                    statusDiv.style.color = "#e74c3c";
                }
                // 3秒後に文字を消す
                setTimeout(() => { statusDiv.innerText = ""; }, 3000);
            })
            .catch(error => {
                statusDiv.innerText = "通信エラーが発生しました";
                statusDiv.style.color = "#e74c3c";
                setTimeout(() => { statusDiv.innerText = ""; }, 3000);
            });
        }
    </script>
</body>
</html>
